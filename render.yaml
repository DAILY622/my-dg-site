# Render Blueprint for Elite Wealth Capital (MY-SITE)
# Auto-deploy enabled - all secrets hardcoded for easy redeployment
# WARNING: Keep repo private - contains API keys

services:
  - type: web
    name: elitewealthcapital
    runtime: docker
    plan: starter
    region: oregon
    autoDeploy: true
    numInstances: 1
    healthCheckPath: /
    maxShutdownDelaySeconds: 5
    
    envVars:
      # Core Django Settings
      - key: DATABASE_URL
        value: postgresql://postgres.fykzoburtipislgjrcjm:gTpjdkGJBLBjdFGT@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
      - key: DJANGO_SETTINGS_MODULE
        value: elite_wealth_capital.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: django-insecure-elite-wealth-prod-key-2024
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,elitewealthcapita.uk,www.elitewealthcapita.uk,portal.elitewealthcapita.uk,.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"
      
      # Admin Credentials
